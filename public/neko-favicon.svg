<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#0A000F" rx="12"/>
  <!-- cat ears -->
  <polygon points="8,28 18,8 26,26" fill="#9B30FF"/>
  <polygon points="38,26 46,8 56,28" fill="#9B30FF"/>
  <!-- head -->
  <ellipse cx="32" cy="36" rx="22" ry="20" fill="#1A0030"/>
  <ellipse cx="32" cy="36" rx="22" ry="20" fill="none" stroke="#9B30FF" stroke-width="1.5"/>
  <!-- eyes -->
  <ellipse cx="23" cy="33" rx="5" ry="6" fill="#9B30FF" opacity="0.9"/>
  <ellipse cx="41" cy="33" rx="5" ry="6" fill="#9B30FF" opacity="0.9"/>
  <ellipse cx="23" cy="33" rx="2" ry="4" fill="#0A000F"/>
  <ellipse cx="41" cy="33" rx="2" ry="4" fill="#0A000F"/>
  <!-- nose -->
  <polygon points="32,40 29,43 35,43" fill="#FF2D9B"/>
  <!-- whiskers -->
  <line x1="10" y1="39" x2="24" y2="41" stroke="#9B30FF" stroke-width="0.8" opacity="0.6"/>
  <line x1="10" y1="43" x2="24" y2="43" stroke="#9B30FF" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="41" x2="54" y2="39" stroke="#9B30FF" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="43" x2="54" y2="43" stroke="#9B30FF" stroke-width="0.8" opacity="0.6"/>
</svg>
